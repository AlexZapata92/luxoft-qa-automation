name: E2E

# Manual trigger only — avoids automatic runs on push/PR when Actions minutes are limited.
# To enable on every push, uncomment the push/pull_request blocks below.
on:
  workflow_dispatch:

# on:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]

jobs:
  e2e:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          BASE_URL: https://the-internet.herokuapp.com

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure/results/
          retention-days: 14

      - name: Upload Codecept failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codecept-output
          path: reports/codecept/output/
          retention-days: 7
